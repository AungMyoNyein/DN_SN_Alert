{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block body %}
<style>
  .filter-select {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 7px 10px; border-radius: 7px; font-size: 13px; outline: none; min-width: 150px;
  }
  .filter-select:focus { border-color: var(--accent); }
</style>
<div class="topbar">
  <div>
    <h2>Dashboard</h2>
    <div class="sub" id="last-updated">Loading…</div>
  </div>
  <div style="display:flex;align-items:flex-end;gap:12px">
    <label style="display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted)">
      Domain
      <select id="f-domain" class="filter-select" onchange="onDomainChange()">
        <option value="">All Domains</option>
      </select>
    </label>
    <label style="display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted)">
      OLT
      <select id="f-olt" class="filter-select" onchange="loadAll()">
        <option value="">All OLTs</option>
      </select>
    </label>
    <button class="btn btn-ghost" onclick="loadAll()">↻ Refresh</button>
  </div>
</div>
<div class="content">

  <!-- Stat cards -->
  <div class="cards">
    <div class="card c-blue">
      <div class="label">Total ONUs</div>
      <div class="value" id="s-total">—</div>
      <div class="sub">registered devices</div>
    </div>
    <div class="card c-green">
      <div class="label">Online</div>
      <div class="value" id="s-online">—</div>
      <div class="sub" id="s-online-pct">—</div>
    </div>
    <div class="card c-red">
      <div class="label">Offline</div>
      <div class="value" id="s-offline">—</div>
      <div class="sub">not reachable</div>
    </div>
    <div class="card c-yellow">
      <div class="label">Power Fail</div>
      <div class="value" id="s-pf">—</div>
      <div class="sub">power outage</div>
    </div>
    <div class="card c-purple">
      <div class="label">LOS</div>
      <div class="value" id="s-los">—</div>
      <div class="sub">loss of signal</div>
    </div>
  </div>

  <!-- DN & SN down alerts table -->
  <div class="table-box">
    <div class="table-header">
      <h3>⚡📡 DN &amp; SN Down Alerts</h3>
      <span id="dnsn-count" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div id="dnsn-body">
      <div class="empty">Loading…</div>
    </div>
  </div>

  <!-- Current issues table -->
  <div class="table-box">
    <div class="table-header">
      <h3>Current Issues</h3>
      <span id="issues-count" style="font-size:12px;color:var(--muted)"></span>
    </div>
    <div id="issues-body">
      <div class="empty">Loading…</div>
    </div>
  </div>

</div>

<script>
let ALL_OLTS = [];   // [{server_id, server_name, olt_name}]

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Build the ?domain=&olt= query string from the current dropdown selection
function filterQS() {
  const dom = document.getElementById('f-domain').value;
  const olt = document.getElementById('f-olt').value;
  const parts = [];
  if (dom) parts.push('domain=' + encodeURIComponent(dom));
  if (olt) parts.push('olt=' + encodeURIComponent(olt));
  return parts.join('&');
}

async function loadFilters() {
  let d;
  try { d = await (await fetch('/api/filters')).json(); }
  catch (e) { return; }
  ALL_OLTS = d.olts || [];
  const dom = document.getElementById('f-domain');
  const keep = dom.value;
  dom.innerHTML = '<option value="">All Domains</option>' +
    (d.servers || []).map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
  dom.value = keep;                 // preserve selection across auto-refresh
  populateOlts();
}

function populateOlts() {
  const dom = document.getElementById('f-domain').value;
  const oltSel = document.getElementById('f-olt');
  const keep = oltSel.value;
  const names = [...new Set(
    ALL_OLTS.filter(o => !dom || String(o.server_id) === String(dom))
            .map(o => o.olt_name).filter(Boolean)
  )].sort();
  oltSel.innerHTML = '<option value="">All OLTs</option>' +
    names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('');
  oltSel.value = names.includes(keep) ? keep : '';
}

function onDomainChange() {
  populateOlts();
  loadAll();
}

function badge(status) {
  const map = {
    'Online':     ['badge-online',  '🟢'],
    'Offline':    ['badge-offline', '🔴'],
    'LOS':        ['badge-los',     '📡'],
    'Power fail': ['badge-pf',      '⚡'],
  };
  const [cls, icon] = map[status] || ['badge-offline', '❓'];
  return `<span class="badge ${cls}">${icon} ${status}</span>`;
}

async function loadStats() {
  const r = await fetch('/api/stats?' + filterQS());
  const d = await r.json();
  document.getElementById('s-total').textContent   = d.total   ?? '—';
  document.getElementById('s-online').textContent  = d.online  ?? '—';
  document.getElementById('s-offline').textContent = d.offline ?? '—';
  document.getElementById('s-pf').textContent      = d.power_fail ?? '—';
  document.getElementById('s-los').textContent     = d.los     ?? '—';
  const pct = d.total ? ((d.online / d.total) * 100).toFixed(1) : '—';
  document.getElementById('s-online-pct').textContent = pct + '% uptime';
  document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
}

// DN = Power fail (dying gasp), SN = LOS (loss of signal)
function dnsnTag(status) {
  if (status === 'Power fail') return '<span class="badge badge-pf">⚡ DN</span>';
  if (status === 'LOS')        return '<span class="badge badge-los">📡 SN</span>';
  return badge(status);
}

function issuesTable(rows, withDnSn) {
  return `<table>
    <thead><tr>
      <th>ONU Name</th><th>Zone</th><th>OLT / Port</th>
      <th>${withDnSn ? 'Type' : 'Status'}</th><th>Signal</th><th>Address</th><th>Since</th>
    </tr></thead>
    <tbody>
    ${rows.map(r => `<tr>
      <td><b>${esc(r.onu_name) || '—'}</b></td>
      <td>${esc(r.zone_name) || '—'}</td>
      <td style="color:var(--muted);font-size:12px">${esc(r.olt_name) || '—'}<br>${esc(r.port_info) || ''}</td>
      <td>${withDnSn ? dnsnTag(r.new_status) : badge(r.new_status)}</td>
      <td style="font-size:12px">${esc(r.signal) || '—'}<br><span style="color:var(--muted)">${r.signal_dbm ? esc(r.signal_dbm)+' dBm' : ''}</span></td>
      <td style="font-size:12px;color:var(--muted)">${esc(r.address) || '—'}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(r.ts) || '—'}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

async function loadIssues() {
  const r = await fetch('/api/current-issues?' + filterQS());
  const rows = await r.json();

  // DN & SN down alerts = Power fail + LOS only
  const dnsn = rows.filter(x => x.new_status === 'Power fail' || x.new_status === 'LOS');
  const dnsnEl = document.getElementById('dnsn-body');
  const dn = dnsn.filter(x => x.new_status === 'Power fail').length;
  const sn = dnsn.filter(x => x.new_status === 'LOS').length;
  document.getElementById('dnsn-count').textContent = `${dn} DN (Power Fail) · ${sn} SN (LOS)`;
  dnsnEl.innerHTML = dnsn.length
    ? issuesTable(dnsn, true)
    : '<div class="empty">✅ No DN (Power Fail) or SN (LOS) alerts</div>';

  // Current issues = everything not online
  const el = document.getElementById('issues-body');
  document.getElementById('issues-count').textContent = rows.length + ' devices with issues';
  el.innerHTML = rows.length
    ? issuesTable(rows, false)
    : '<div class="empty">✅ All ONUs online — no current issues</div>';
}

function loadAll() {
  loadStats();
  loadIssues();
}

// Populate dropdowns first, then load everything
loadFilters().then(loadAll);
setInterval(() => { loadFilters(); loadAll(); }, 60000); // refresh every minute
</script>
{% endblock %}
